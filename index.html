<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { background-color: #171717; }
    </style>
</head>
<body class="min-h-screen flex">
    <div id="login-screen" class="w-full min-h-screen flex items-center justify-center bg-black">
        <form id="login-form" class="bg-neutral-900 p-8 rounded-xl border border-neutral-800 flex flex-col gap-4 w-96">
            <h2 class="text-2xl font-bold tracking-widest text-center text-white">ADMIN LOGIN</h2>
            <input type="text" id="username" placeholder="Username" class="bg-black border border-neutral-800 p-3 rounded text-white outline-none focus:border-neutral-500" required>
            <input type="password" id="password" placeholder="Password" class="bg-black border border-neutral-800 p-3 rounded text-white outline-none focus:border-neutral-500" required>
            <button type="submit" class="bg-white text-black font-bold p-3 rounded hover:bg-neutral-200 transition-colors mt-2">LOGIN</button>
        </form>
    </div>

    <div id="dashboard-screen" class="w-full flex hidden">
        <nav class="w-64 border-r border-neutral-900 p-6 flex flex-col gap-4 bg-black z-10">
            <h1 class="text-2xl font-bold tracking-widest mb-8 text-neutral-100">ADMIN.</h1>
            <button onclick="switchTab('stats')" id="btn-stats" class="nav-btn active text-left p-3 rounded-lg hover:bg-neutral-900">Статистика</button>
            <button onclick="switchTab('players')" id="btn-players" class="nav-btn text-left p-3 rounded-lg hover:bg-neutral-900">Игроки</button>
            <button onclick="logout()" class="text-left p-3 rounded-lg text-red-500 hover:bg-neutral-900 mt-auto">Выход</button>
        </nav>

        <main class="flex-1 p-10 bg-black relative overflow-y-auto h-screen">
            <div id="tab-stats" class="tab-content fade-in">
                <h2 class="text-3xl font-bold mb-6">Главная статистика</h2>
                <div class="bg-neutral-900 p-6 rounded-xl border border-neutral-800 w-64">
                    <p class="text-neutral-400">Всего игроков</p>
                    <p id="stat-total-players" class="text-4xl font-semibold mt-2">0</p>
                </div>
            </div>
            <div id="tab-players" class="tab-content hidden fade-in">
                <h2 class="text-3xl font-bold mb-6">База игроков</h2>
                <div class="bg-neutral-900 rounded-xl border border-neutral-800 overflow-hidden">
                    <div id="players-list" class="flex flex-col"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "https://ruapi.onrender.com/api";
        let token = localStorage.getItem('adminToken');

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                
                if (data.token) {
                    localStorage.setItem('adminToken', data.token);
                    token = data.token;
                    checkAuth();
                } else {
                    alert("Ошибка входа");
                }
            } catch(err) {
                alert("Ошибка соединения с сервером");
            }
        });

        function checkAuth() {
            if (token) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard-screen').classList.add('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            token = null;
            checkAuth();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('active');
        }

        async function loadData() {
            try {
                const res = await fetch(`${API_BASE}/admin/players`);
                const players = await res.json();
                
                document.getElementById('stat-total-players').innerText = players.length;
                const list = document.getElementById('players-list');
                list.innerHTML = '';
                
                players.forEach(p => {
                    const avatarUrl = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${p.userId}&size=150x150&format=Png&isCircular=true`;
                    list.innerHTML += `
                        <div class="p-4 border-b border-neutral-800 flex items-center justify-between hover:bg-neutral-800 transition-colors">
                            <div class="flex items-center gap-4">
                                <img src="${avatarUrl}" class="w-12 h-12 rounded-full border border-neutral-700">
                                <div>
                                    <p class="font-bold text-white">${p.username}</p>
                                    <p class="text-xs text-neutral-500">ID: ${p.userId}</p>
                                </div>
                            </div>
                            <span class="text-sm bg-black border border-neutral-800 px-3 py-1 rounded-full text-neutral-300">
                                Визиты: ${p.visits}
                            </span>
                        </div>
                    `;
                });
            } catch(err) {
                console.error("Сервер недоступен");
            }
        }

        checkAuth();
    </script>
</body>
</html>
