<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN.SYS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #fff; overflow: hidden; }
        .hidden { display: none !important; }
        .nav-btn { transition: all 0.3s ease; border-left: 3px solid transparent; }
        .nav-btn:hover { background-color: #111; padding-left: 1.5rem; }
        .nav-btn.active { background-color: #111; border-left: 3px solid #fff; padding-left: 1.5rem; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .log-box { font-family: 'Courier New', Courier, monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        .glass-panel { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-hover:hover { box-shadow: 0 0 15px rgba(255,255,255,0.1); transform: translateY(-2px); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex relative">
    <div id="login-screen" class="w-full min-h-screen flex items-center justify-center bg-black absolute z-50 transition-opacity duration-500">
        <form id="login-form" class="glass-panel p-10 rounded-xl flex flex-col gap-6 w-96 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white to-transparent opacity-20"></div>
            <h2 class="text-3xl font-black tracking-widest text-center text-white drop-shadow-lg">SYSTEM</h2>
            <input type="text" id="username" placeholder="USER" class="bg-black/50 border border-neutral-800 p-4 rounded-lg text-white outline-none focus:border-neutral-500 tracking-widest transition-colors" required>
            <input type="password" id="password" placeholder="KEY" class="bg-black/50 border border-neutral-800 p-4 rounded-lg text-white outline-none focus:border-neutral-500 tracking-widest transition-colors" required>
            <button type="submit" class="bg-white text-black font-black p-4 rounded-lg hover:bg-neutral-300 transition-all duration-300 mt-2 tracking-widest hover:shadow-[0_0_20px_rgba(255,255,255,0.4)]">ACCESS</button>
        </form>
    </div>

    <div id="dashboard-screen" class="w-full flex hidden opacity-0 transition-opacity duration-500">
        <nav class="w-72 border-r border-neutral-900/50 p-6 flex flex-col gap-2 bg-[#050505] z-10 shadow-2xl">
            <h1 class="text-4xl font-black tracking-widest mb-10 text-white mt-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">ADMIN.</h1>
            <button onclick="switchTab('stats')" id="btn-stats" class="nav-btn active text-left p-4 rounded-r-lg font-bold tracking-widest text-sm text-neutral-400 hover:text-white">ОБЗОР</button>
            <button onclick="switchTab('servers')" id="btn-servers" class="nav-btn text-left p-4 rounded-r-lg font-bold tracking-widest text-sm text-neutral-400 hover:text-white">СЕРВЕРА</button>
            <button onclick="switchTab('players')" id="btn-players" class="nav-btn text-left p-4 rounded-r-lg font-bold tracking-widest text-sm text-neutral-400 hover:text-white">БАЗА</button>
            <button onclick="switchTab('console')" id="btn-console" class="nav-btn text-left p-4 rounded-r-lg font-bold tracking-widest text-sm text-neutral-400 hover:text-white">ТЕРМИНАЛ</button>
            <button onclick="logout()" class="text-left p-4 rounded-r-lg text-red-600/70 hover:text-red-500 hover:bg-red-900/10 mt-auto font-bold tracking-widest text-sm transition-all duration-300">ОТКЛЮЧИТЬСЯ</button>
        </nav>

        <main class="flex-1 p-12 relative overflow-y-auto h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#111] via-[#050505] to-black">
            <div id="tab-stats" class="tab-content block fade-in">
                <h2 class="text-4xl font-black mb-10 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-neutral-500">СТАТИСТИКА</h2>
                <div class="grid grid-cols-3 gap-8">
                    <div class="glass-panel p-8 rounded-2xl glow-hover transition-all duration-300">
                        <p class="text-neutral-500 font-bold tracking-widest text-xs mb-4">ТЕКУЩИЙ ОНЛАЙН</p>
                        <p id="stat-online" class="text-7xl font-black drop-shadow-[0_0_20px_rgba(255,255,255,0.2)]">0</p>
                    </div>
                    <div class="glass-panel p-8 rounded-2xl glow-hover transition-all duration-300">
                        <p class="text-neutral-500 font-bold tracking-widest text-xs mb-4">УНИКАЛЬНЫЕ ИГРОКИ</p>
                        <p id="stat-total" class="text-7xl font-black drop-shadow-[0_0_20px_rgba(255,255,255,0.2)]">0</p>
                    </div>
                    <div class="glass-panel p-8 rounded-2xl glow-hover transition-all duration-300">
                        <p class="text-neutral-500 font-bold tracking-widest text-xs mb-4">АКТИВНЫЕ СЕССИИ</p>
                        <p id="stat-servers" class="text-7xl font-black drop-shadow-[0_0_20px_rgba(255,255,255,0.2)]">0</p>
                    </div>
                </div>
            </div>

            <div id="tab-servers" class="tab-content hidden fade-in">
                <h2 class="text-4xl font-black mb-10 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-neutral-500">СЕРВЕРА</h2>
                <div class="grid grid-cols-2 gap-6" id="servers-list"></div>
            </div>

            <div id="tab-players" class="tab-content hidden fade-in flex flex-col h-full">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-neutral-500">БАЗА ДАННЫХ</h2>
                    <input type="text" id="search-input" placeholder="ПОИСК ИГРОКА..." class="bg-black/50 border border-neutral-800 p-3 rounded-lg text-white outline-none w-80 focus:border-neutral-400 transition-colors font-mono text-sm">
                </div>
                <div class="glass-panel rounded-2xl overflow-hidden flex-1 overflow-y-auto" id="players-list"></div>
            </div>

            <div id="tab-console" class="tab-content hidden flex flex-col h-full fade-in">
                <h2 class="text-4xl font-black mb-10 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-white to-neutral-500">ТЕРМИНАЛ</h2>
                <div class="flex gap-4 mb-4">
                    <select id="server-selector" class="glass-panel p-4 rounded-xl text-white outline-none w-72 font-mono text-sm border-none cursor-pointer">
                        <option value="all" class="bg-black">ВСЕ СЕРВЕРА</option>
                    </select>
                </div>
                <div class="flex gap-4 mb-6 relative group">
                    <input type="text" id="cmd-input" placeholder="> LUA SCRIPT..." class="flex-1 glass-panel p-5 rounded-xl text-white outline-none font-mono focus:bg-[#111] transition-all border-none">
                    <button onclick="sendCommand('console')" class="bg-white text-black font-black tracking-widest px-10 rounded-xl hover:bg-neutral-200 transition-all hover:shadow-[0_0_20px_rgba(255,255,255,0.3)]">EXECUTE</button>
                    <button onclick="copyLogs()" class="glass-panel text-white font-bold tracking-widest px-8 rounded-xl hover:bg-white/10 transition-all border-none">COPY</button>
                </div>
                <div class="flex-1 glass-panel rounded-xl p-6 overflow-y-auto log-box text-sm flex flex-col gap-2 border-none" id="log-container"></div>
            </div>
        </main>
    </div>

    <div id="manage-modal" class="fixed inset-0 modal-bg z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel border border-neutral-800 rounded-2xl p-10 w-[600px] shadow-2xl relative overflow-hidden scale-95 transition-transform duration-300" id="modal-content">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neutral-800 via-white to-neutral-800 opacity-30"></div>
            
            <div class="flex justify-between items-start mb-8">
                <div class="flex items-center gap-6">
                    <img id="modal-avatar" src="" class="w-20 h-20 rounded-xl border border-neutral-700 bg-black/50 p-1">
                    <div>
                        <h3 class="text-3xl font-black tracking-wider drop-shadow-md" id="modal-player-name">USER</h3>
                        <p class="text-sm text-neutral-500 font-mono mt-1" id="modal-player-id">ID: 0</p>
                    </div>
                </div>
                <button onclick="closeManageModal()" class="text-neutral-500 hover:text-white transition-colors p-2">&times;</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-8 bg-black/40 p-4 rounded-xl border border-neutral-800/50">
                <div>
                    <p class="text-[10px] text-neutral-500 font-bold tracking-widest mb-1">БАЛАНС</p>
                    <p class="text-lg font-mono text-green-400 drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]" id="modal-coins">0</p>
                </div>
                <div>
                    <p class="text-[10px] text-neutral-500 font-bold tracking-widest mb-1">ПОСЛЕДНИЙ ВХОД</p>
                    <p class="text-sm font-mono text-neutral-300" id="modal-last-seen">-</p>
                </div>
                <div class="col-span-2">
                    <p class="text-[10px] text-neutral-500 font-bold tracking-widest mb-1">ПЕРВЫЙ ВХОД</p>
                    <p class="text-sm font-mono text-neutral-300" id="modal-first-joined">-</p>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="bg-black/60 p-5 border border-neutral-800/50 rounded-xl flex flex-col gap-3">
                    <p class="text-xs text-neutral-500 font-bold tracking-widest">GIFTBUX</p>
                    <div class="flex gap-3">
                        <input type="number" id="input-coins" placeholder="КОЛИЧЕСТВО" class="flex-1 bg-[#111] border border-neutral-800 p-3 rounded-lg text-white outline-none font-mono text-sm">
                        <button onclick="manageAction('give_coins')" class="bg-white text-black font-black tracking-widest px-6 rounded-lg hover:bg-neutral-200 transition-all text-sm">ВЫДАТЬ</button>
                    </div>
                </div>

                <div class="bg-black/60 p-5 border border-neutral-800/50 rounded-xl flex flex-col gap-3">
                    <p class="text-xs text-neutral-500 font-bold tracking-widest">КЕЙСЫ</p>
                    <select id="input-case-name" class="w-full bg-[#111] border border-neutral-800 p-3 rounded-lg text-white outline-none font-mono text-sm">
                        <option value="DotaCase">Dota Case</option>
                        <option value="LoveCase">Love Case</option>
                        <option value="SummerCase">Summer Case</option>
                        <option value="MemeCase">Meme Case</option>
                    </select>
                    <div class="flex gap-3">
                        <input type="number" id="input-case-amount" placeholder="КОЛИЧЕСТВО" class="flex-1 bg-[#111] border border-neutral-800 p-3 rounded-lg text-white outline-none font-mono text-sm">
                        <button onclick="manageAction('give_case')" class="bg-white text-black font-black tracking-widest px-6 rounded-lg hover:bg-neutral-200 transition-all text-sm">ВЫДАТЬ</button>
                    </div>
                </div>

                <div class="bg-black/60 p-5 border border-neutral-800/50 rounded-xl flex flex-col gap-3">
                    <p class="text-xs text-neutral-500 font-bold tracking-widest">NAMETAG</p>
                    <div class="flex gap-3">
                        <input type="text" id="input-tag-id" placeholder="ID ТЕГА" class="flex-1 bg-[#111] border border-neutral-800 p-3 rounded-lg text-white outline-none font-mono text-sm">
                        <button onclick="manageAction('give_tag')" class="bg-white text-black font-black tracking-widest px-6 rounded-lg hover:bg-neutral-200 transition-all text-sm">ВЫДАТЬ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://https://ruapi.onrender.com/api";
        let token = localStorage.getItem('adminToken');
        let refreshInterval;
        let currentPlayerManage = null;
        let allPlayersData = [];

        document.getElementById('search-input').addEventListener('input', renderPlayers);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username.value, password: password.value })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('adminToken', data.token);
                token = data.token;
                checkAuth();
            }
        });

        function checkAuth() {
            if (token) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    setTimeout(() => document.getElementById('dashboard-screen').style.opacity = '1', 50);
                    loadData();
                    refreshInterval = setInterval(loadData, 2000);
                }, 500);
            } else {
                document.getElementById('dashboard-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('dashboard-screen').classList.add('hidden');
                    document.getElementById('login-screen').classList.remove('hidden');
                    setTimeout(() => document.getElementById('login-screen').style.opacity = '1', 50);
                    clearInterval(refreshInterval);
                }, 500);
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            token = null;
            checkAuth();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('active');
        }

        function openManageModal(userId) {
            const player = allPlayersData.find(p => p.userId === userId);
            if (!player) return;

            currentPlayerManage = player.username;
            document.getElementById('modal-player-name').innerText = player.username;
            document.getElementById('modal-player-id').innerText = `ID: ${player.userId}`;
            document.getElementById('modal-avatar').src = `${API_BASE}/avatar/${player.userId}`;
            document.getElementById('modal-coins').innerText = player.coins || 0;
            
            const formatTime = (ts) => ts ? new Date(ts).toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' }) : "Неизвестно";
            document.getElementById('modal-last-seen').innerText = formatTime(player.lastSeen);
            document.getElementById('modal-first-joined').innerText = formatTime(player.firstJoined);

            const modal = document.getElementById('manage-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.style.opacity = '1';
                content.style.transform = 'scale(1)';
            }, 10);
        }

        function closeManageModal() {
            currentPlayerManage = null;
            const modal = document.getElementById('manage-modal');
            const content = document.getElementById('modal-content');
            modal.style.opacity = '0';
            content.style.transform = 'scale(0.95)';
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function manageAction(action) {
            if (!currentPlayerManage) return;
            let payload = { action: action, username: currentPlayerManage, jobId: "all" };
            if (action === 'give_coins') {
                payload.amount = parseInt(document.getElementById('input-coins').value);
                document.getElementById('input-coins').value = '';
            } else if (action === 'give_case') {
                payload.caseName = document.getElementById('input-case-name').value;
                payload.amount = parseInt(document.getElementById('input-case-amount').value);
                document.getElementById('input-case-amount').value = '';
            } else if (action === 'give_tag') {
                payload.tagId = document.getElementById('input-tag-id').value;
                document.getElementById('input-tag-id').value = '';
            }
            if((action === 'give_coins' || action === 'give_case') && (!payload.amount || payload.amount <= 0)) return;
            if(action === 'give_tag' && !payload.tagId) return;

            await fetch(`${API_BASE}/admin/command`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            closeManageModal();
        }

        async function sendCommand(action, username = null) {
            const jobId = document.getElementById('server-selector')?.value || "all";
            const code = document.getElementById('cmd-input')?.value || "";
            await fetch(`${API_BASE}/admin/command`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, jobId, username, code }) });
            if (action === 'console') document.getElementById('cmd-input').value = "";
        }

        function copyLogs() {
            navigator.clipboard.writeText(document.getElementById('log-container').innerText);
        }

        function renderPlayers() {
            const list = document.getElementById('players-list');
            const query = document.getElementById('search-input').value.toLowerCase();
            list.innerHTML = '';
            
            const filtered = allPlayersData.filter(p => p.username.toLowerCase().includes(query) || p.userId.toString().includes(query));
            
            filtered.forEach(p => {
                const statusColor = (Date.now() - p.lastSeen < 30000) ? 'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : 'bg-neutral-700';
                list.innerHTML += `
                    <div class="p-6 border-b border-neutral-900/50 flex items-center justify-between hover:bg-white/[0.02] transition-colors relative group">
                        <div class="flex items-center gap-6">
                            <div class="relative">
                                <img src="${API_BASE}/avatar/${p.userId}" class="w-14 h-14 rounded-full border border-neutral-700/50 bg-[#0a0a0a] p-1 group-hover:border-neutral-500 transition-colors">
                                <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full ${statusColor} border-2 border-[#0a0a0a]"></div>
                            </div>
                            <div>
                                <p class="font-black text-lg text-white tracking-widest drop-shadow-sm">${p.username}</p>
                                <div class="flex gap-4 mt-1">
                                    <p class="text-xs text-neutral-600 font-mono">ID: ${p.userId}</p>
                                    <p class="text-xs text-green-500/80 font-bold font-mono">🪙 ${p.coins || 0}</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openManageModal(${p.userId})" class="bg-white/10 text-white px-6 py-2 rounded-lg hover:bg-white hover:text-black font-black tracking-widest text-xs transition-all border border-transparent">OPEN</button>
                            <button onclick="sendCommand('kick', '${p.username}')" class="bg-red-900/20 text-red-500 border border-red-900/50 px-6 py-2 rounded-lg hover:bg-red-600 hover:text-white font-black tracking-widest text-xs transition-all">KICK</button>
                        </div>
                    </div>
                `;
            });
        }

        async function loadData() {
            try {
                const res = await fetch(`${API_BASE}/admin/data`);
                const db = await res.json();
                
                let online = 0;
                const serversList = document.getElementById('servers-list');
                const selector = document.getElementById('server-selector');
                
                if (!document.getElementById('tab-servers').classList.contains('hidden') || !document.getElementById('tab-console').classList.contains('hidden')) {
                    serversList.innerHTML = '';
                    const oldVal = selector.value;
                    selector.innerHTML = '<option value="all" class="bg-black">ВСЕ СЕРВЕРА</option>';
                    
                    Object.keys(db.servers).forEach(id => {
                        const srv = db.servers[id];
                        online += srv.playerCount;
                        serversList.innerHTML += `
                            <div class="glass-panel p-8 rounded-2xl relative glow-hover transition-all">
                                <div class="absolute top-6 right-6 w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,197,94,0.8)]"></div>
                                <p class="text-[10px] text-neutral-500 mb-3 font-mono tracking-widest">JOBID: ${id.substring(0,18)}...</p>
                                <p class="text-4xl font-black mb-6 tracking-wide">${srv.playerCount} <span class="text-sm text-neutral-600 font-bold tracking-widest">ИГРОКОВ</span></p>
                                <div class="flex gap-2 text-xs text-neutral-400 font-mono flex-wrap">
                                    ${srv.players.map(p => `<span class="bg-white/5 px-2 py-1 rounded border border-white/5">${p}</span>`).join('')}
                                </div>
                            </div>
                        `;
                        selector.innerHTML += `<option value="${id}" class="bg-black">${id.substring(0,8)} (${srv.playerCount})</option>`;
                    });
                    selector.value = oldVal || "all";
                } else {
                    Object.keys(db.servers).forEach(id => online += db.servers[id].playerCount);
                }

                document.getElementById('stat-online').innerText = online;
                document.getElementById('stat-total').innerText = db.players.length;
                document.getElementById('stat-servers').innerText = Object.keys(db.servers).length;

                allPlayersData = db.players.sort((a, b) => b.lastSeen - a.lastSeen);
                if (!document.getElementById('tab-players').classList.contains('hidden')) renderPlayers();

                if (!document.getElementById('tab-console').classList.contains('hidden')) {
                    const logs = document.getElementById('log-container');
                    const isScrolledToBottom = logs.scrollHeight - logs.clientHeight <= logs.scrollTop + 10;
                    logs.innerHTML = '';
                    db.logs.forEach(l => {
                        let color = l.type === 'Enum.MessageType.MessageError' ? 'text-red-400 font-bold' : 'text-neutral-400';
                        logs.innerHTML += `<div class="flex gap-4 border-b border-white/5 pb-1"><span class="text-neutral-600 w-20 shrink-0">${l.time}</span><span class="${color} break-all">[${l.jobId.substring(0,8)}] ${l.message}</span></div>`;
                    });
                    if (isScrolledToBottom) logs.scrollTop = logs.scrollHeight;
                }

            } catch(err) {}
        }
        checkAuth();
    </script>
</body>
</html>
